{% extends 'base.html' %}
{% block content %}
<h1>Products</h1>

<form method="post" action="{{ url_for('products_create') }}" class="card form-grid">
  <div>
    <label>Name</label>
    <input type="text" name="name" required>
  </div>
  <div>
    <label>Unit Price</label>
    <input type="number" step="0.01" name="unit_price" value="0">
  </div>
  <div class="full">
    <button class="btn" type="submit">Add Product</button>
  </div>
  </form>

<table class="table">
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Unit Price</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for p in products %}
    <tr>
      <td>{{ p.id }}</td>
      <td>{{ p.name }}</td>
      <td>{{ '%.2f'|format(p.unit_price) }}</td>
      <td>
        <form method="post" action="{{ url_for('products_delete', product_id=p.id) }}" style="display:inline" onsubmit="return confirm('Delete?')">
          <button type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
