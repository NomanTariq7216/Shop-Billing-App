{% extends 'base.html' %}
{% block content %}
<h1>Customers</h1>

<form method="post" action="{{ url_for('customers_create') }}" class="card form-grid">
  <div>
    <label>Name</label>
    <input type="text" name="name" required>
  </div>
  <div>
    <label>Phone</label>
    <input type="text" name="phone">
  </div>
  <div>
    <label>Address</label>
    <input type="text" name="address">
  </div>
  <div>
    <label>Opening Balance</label>
    <input type="number" step="0.01" name="opening_balance" value="0">
  </div>
  <div class="full">
    <button class="btn" type="submit">Add Customer</button>
  </div>
  </form>

<table class="table">
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Phone</th>
      <th>Balance</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for c in customers %}
    <tr>
      <td>{{ c.id }}</td>
      <td>{{ c.name }}</td>
      <td>{{ c.phone }}</td>
      <td>{{ '%.2f'|format(c.balance()) }}</td>
      <td>
        <a href="{{ url_for('customer_statement', customer_id=c.id) }}">Statement</a>
        <form method="post" action="{{ url_for('customers_delete', customer_id=c.id) }}" style="display:inline" onsubmit="return confirm('Delete?')">
          <button type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
