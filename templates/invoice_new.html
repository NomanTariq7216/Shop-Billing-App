{% extends 'base.html' %}
{% block content %}
<h1>New Invoice</h1>

<form method="post" action="{{ url_for('invoice_create') }}" id="invoice-form" class="card">
  <div class="form-grid">
    <div>
      <label>Customer (optional for cash)</label>
      <select name="customer_id">
        <option value="">Walk-in</option>
        {% for c in customers %}
        <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Credit?</label>
      <input type="checkbox" name="is_credit">
    </div>
  </div>

  <table class="table" id="items-table">
    <thead>
      <tr>
        <th>Product</th>
        <th>Description</th>
        <th>Qty</th>
        <th>Unit Price</th>
        <th>Line Total</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="items-body">
      <tr class="item-row">
        <td>
          <select name="product_id">
            <option value="">--</option>
            {% for p in products %}
            <option value="{{ p.id }}" data-price="{{ '%.2f'|format(p.unit_price) }}">{{ p.name }}</option>
            {% endfor %}
          </select>
        </td>
        <td><input type="text" name="description" placeholder="Description"></td>
        <td><input type="number" step="0.01" name="quantity" value="1"></td>
        <td><input type="number" step="0.01" name="unit_price" value="0"></td>
        <td class="line-total">0.00</td>
        <td><button type="button" class="remove">✕</button></td>
      </tr>
    </tbody>
  </table>

  <div class="actions">
    <button type="button" id="add-row">Add Item</button>
    <div class="total">Total: <span id="grand-total">0.00</span></div>
    <button class="btn" type="submit">Create</button>
  </div>
  </form>

<script>
document.addEventListener('change', function(e) {
  if (e.target.name === 'product_id') {
    const price = parseFloat(e.target.selectedOptions[0]?.dataset.price || '0');
    const row = e.target.closest('.item-row');
    const priceInput = row.querySelector('input[name="unit_price"]');
    if (price > 0 && parseFloat(priceInput.value || '0') === 0) {
      priceInput.value = price.toFixed(2);
    }
  }
  if (['quantity', 'unit_price'].includes(e.target.name)) {
    updateTotals();
  }
});

document.getElementById('add-row').addEventListener('click', function() {
  const tbody = document.getElementById('items-body');
  const tr = document.createElement('tr');
  tr.className = 'item-row';
  tr.innerHTML = `
    <td>
      <select name="product_id">
        <option value="">--</option>
        {% for p in products %}
        <option value="{{ p.id }}" data-price="{{ '%.2f'|format(p.unit_price) }}">{{ p.name }}</option>
        {% endfor %}
      </select>
    </td>
    <td><input type="text" name="description" placeholder="Description"></td>
    <td><input type="number" step="0.01" name="quantity" value="1"></td>
    <td><input type="number" step="0.01" name="unit_price" value="0"></td>
    <td class="line-total">0.00</td>
    <td><button type="button" class="remove">✕</button></td>`;
  tbody.appendChild(tr);
});

document.addEventListener('click', function(e) {
  if (e.target.classList.contains('remove')) {
    e.target.closest('tr').remove();
    updateTotals();
  }
});

function updateTotals() {
  let total = 0;
  document.querySelectorAll('.item-row').forEach(row => {
    const qty = parseFloat(row.querySelector('input[name="quantity"]').value || '0');
    const price = parseFloat(row.querySelector('input[name="unit_price"]').value || '0');
    const line = qty * price;
    row.querySelector('.line-total').textContent = line.toFixed(2);
    total += line;
  });
  document.getElementById('grand-total').textContent = total.toFixed(2);
}

updateTotals();
</script>
{% endblock %}
