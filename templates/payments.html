{% extends 'base.html' %}
{% block content %}
<h1>Payments</h1>

<form method="post" action="{{ url_for('payments_create') }}" class="card form-grid">
  <div>
    <label>Customer</label>
    <select name="customer_id" required>
      <option value="">Select...</option>
      {% for c in customers %}
      <option value="{{ c.id }}">{{ c.name }} ({{ '%.2f'|format(c.balance()) }})</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label>Amount</label>
    <input type="number" step="0.01" name="amount" required>
  </div>
  <div>
    <label>Method</label>
    <input type="text" name="method" placeholder="Cash / Bank / Other">
  </div>
  <div class="full">
    <label>Notes</label>
    <input type="text" name="notes">
  </div>
  <div class="full">
    <button class="btn" type="submit">Record Payment</button>
  </div>
  </form>

<h2>Recent</h2>
<table class="table">
  <thead>
    <tr>
      <th>Date</th>
      <th>Customer</th>
      <th>Amount</th>
      <th>Method</th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody>
    {% for p in payments %}
    <tr>
      <td>{{ p.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
      <td>{{ p.customer.name }}</td>
      <td>{{ '%.2f'|format(p.amount) }}</td>
      <td>{{ p.method }}</td>
      <td>{{ p.notes }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
